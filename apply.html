<!doctype html>
<html>
<head>
  <title>Apply</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #0f172a;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    .muted {
      color: #64748b;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
    }

    .step-label {
      color: #64748b;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .question {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 18px;
    }

    input,
    select {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      margin-bottom: 14px;
      box-sizing: border-box;
      background: white;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button,
    .btn-link {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .primary {
      background: #2f5bea;
      color: white;
    }

    .secondary {
      background: #eef2f7;
      color: #0f172a;
    }

    .hidden {
      display: none;
    }

    .summary-item {
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .summary-title {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .notice {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      line-height: 1.6;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: #475569;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Rental Application</h1>
    <p class="muted" id="unitText"></p>

    <div class="card" id="stepBox">
      <div class="step-label" id="stepLabel"></div>
      <h2 class="question" id="questionText"></h2>

      <div id="inputArea"></div>

      <div class="actions">
        <button id="backBtn" type="button" class="secondary hidden">Back</button>
        <button id="nextBtn" type="button" class="primary">Continue</button>
        <button id="skipBtn" type="button" class="secondary">Skip</button>
      </div>
    </div>

    <div class="card hidden" id="summaryBox">
      <div class="step-label">Review</div>
      <h2 class="question">Review your answers</h2>

      <div id="summaryList"></div>

      <div class="notice">
        Your answers will move into review. After review, the next steps can include showing, move-in payment, and agreement steps.
      </div>

      <div class="actions">
        <button id="editBtn" type="button" class="secondary">Back</button>
        <button id="submitBtn" type="button" class="primary">Continue to Review</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const unit = params.get("unit") || "Unknown Property";

    document.getElementById("unitText").innerText = "Applying for: " + unit;

    const steps = [
      {
        key: "moveInDate",
        label: "Step 1 of 5",
        question: "What is your desired move-in date?",
        type: "date"
      },
      {
        key: "monthlyIncome",
        label: "Step 2 of 5",
        question: "What is your monthly household income?",
        type: "select",
        options: [
          "Under $2,000",
          "$2,000-$4,000",
          "$4,000-$6,000",
          "$6,000+"
        ]
      },
      {
        key: "occupants",
        label: "Step 3 of 5",
        question: "How many occupants will live in the property?",
        type: "select",
        options: ["1", "2", "3", "4+"]
      },
      {
        key: "pets",
        label: "Step 4 of 5",
        question: "Do you have pets?",
        type: "select",
        options: ["No pets", "Yes, 1 pet", "Yes, 2+ pets"]
      },
      {
        key: "creditRange",
        label: "Step 5 of 5",
        question: "What is your estimated credit range?",
        type: "select",
        options: ["Under 600", "600-649", "650-699", "700+"]
      }
    ];

    const data = {
      moveInDate: "",
      monthlyIncome: "",
      occupants: "",
      pets: "",
      creditRange: ""
    };

    let currentStep = 0;

    const stepLabel = document.getElementById("stepLabel");
    const questionText = document.getElementById("questionText");
    const inputArea = document.getElementById("inputArea");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const skipBtn = document.getElementById("skipBtn");
    const summaryBox = document.getElementById("summaryBox");
    const stepBox = document.getElementById("stepBox");
    const summaryList = document.getElementById("summaryList");
    const editBtn = document.getElementById("editBtn");
    const submitBtn = document.getElementById("submitBtn");

    function renderStep() {
      const step = steps[currentStep];

      stepLabel.innerText = step.label;
      questionText.innerText = step.question;
      inputArea.innerHTML = "";
      backBtn.classList.toggle("hidden", currentStep === 0);

      if (step.type === "date") {
        const input = document.createElement("input");
        input.type = "date";
        input.id = "stepInput";
        input.value = data[step.key] || "";
        inputArea.appendChild(input);
      }

      if (step.type === "select") {
        const select = document.createElement("select");
        select.id = "stepInput";

        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "Choose one";
        select.appendChild(defaultOption);

        step.options.forEach(option => {
          const opt = document.createElement("option");
          opt.value = option;
          opt.textContent = option;
          if (data[step.key] === option) {
            opt.selected = true;
          }
          select.appendChild(opt);
        });

        inputArea.appendChild(select);
      }
    }

    function validateStep() {
      const step = steps[currentStep];
      const input = document.getElementById("stepInput");
      const value = input.value;

      if (!value) {
        alert("Please complete this step or press Skip.");
        return false;
      }

      data[step.key] = value;
      return true;
    }

    function goNext() {
      if (currentStep < steps.length - 1) {
        currentStep += 1;
        renderStep();
      } else {
        showSummary();
      }
    }

    function showSummary() {
      stepBox.classList.add("hidden");
      summaryBox.classList.remove("hidden");
      summaryList.innerHTML = "";

      steps.forEach(step => {
        const row = document.createElement("div");
        row.className = "summary-item";
        row.innerHTML = `
          <div class="summary-title">${step.question}</div>
          <div>${data[step.key] || "Skipped"}</div>
        `;
        summaryList.appendChild(row);
      });
    }

    nextBtn.addEventListener("click", () => {
      if (!validateStep()) return;
      goNext();
    });

    skipBtn.addEventListener("click", () => {
      const step = steps[currentStep];
      if (!data[step.key]) {
        data[step.key] = "Skipped";
      }
      goNext();
    });

    backBtn.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep -= 1;
        renderStep();
      }
    });

    editBtn.addEventListener("click", () => {
      summaryBox.classList.add("hidden");
      stepBox.classList.remove("hidden");
      currentStep = steps.length - 1;
      renderStep();
    });

    submitBtn.addEventListener("click", () => {
      window.location.href = "approved.html?unit=" + unit;
    });

    renderStep();
  </script>
</body>
</html>
